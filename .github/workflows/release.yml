name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            arch: aarch64
            bun_target: bun-darwin-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            arch: x64
            bun_target: bun-darwin-x64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: npm install

      - name: Build MCP server binary
        run: |
          mkdir -p src-tauri/binaries
          bun build src/mcp/server.mjs --compile --outfile src-tauri/binaries/caja-mcp-${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }} --target ${{ matrix.bun_target }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'Caja v__VERSION__'
          releaseBody: 'See assets to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      # tauri-action repackages .app into .tar.gz, invalidating the CLI's .sig.
      # Re-sign the repackaged .tar.gz and upload the new .sig.
      - name: Sign and upload updater signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAR_FILE=$(find src-tauri/target -name "Caja.app.tar.gz" -type f | head -1)
          echo "Tar file: $TAR_FILE"
          if [ -z "$TAR_FILE" ]; then
            echo "::error::No .tar.gz found"
            exit 1
          fi

          # Re-sign the repackaged tar.gz
          npx tauri signer sign "$TAR_FILE" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          SIG_FILE="${TAR_FILE}.sig"
          echo "Sig file: $SIG_FILE"
          ls -la "$SIG_FILE"

          # Rename to arch-specific filename so both builds have unique asset names
          NAMED_SIG="Caja_${{ matrix.arch }}.app.tar.gz.sig"
          cp "$SIG_FILE" "$NAMED_SIG"
          gh release upload "${{ github.ref_name }}" "$NAMED_SIG" --clobber

      # Upload a version-free DMG alias for stable download URLs
      - name: Upload stable DMG link
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_FILE=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          cp "$DMG_FILE" "Caja_${{ matrix.arch }}.dmg"
          gh release upload "${{ github.ref_name }}" "Caja_${{ matrix.arch }}.dmg" --clobber

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Fetch release notes from the GitHub release body
          RELEASE_BODY=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null || echo "")

          mkdir -p sigs
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.sig" --dir sigs/

          ls -la sigs/

          AARCH64_SIG=$(cat sigs/Caja_aarch64.app.tar.gz.sig)
          X64_SIG=$(cat sigs/Caja_x64.app.tar.gz.sig)
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "${RELEASE_BODY:-Caja v$VERSION}" \
            --arg pub_date "$PUB_DATE" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg aarch64_url "https://github.com/${{ github.repository }}/releases/download/$TAG/Caja_aarch64.app.tar.gz" \
            --arg x64_sig "$X64_SIG" \
            --arg x64_url "https://github.com/${{ github.repository }}/releases/download/$TAG/Caja_x64.app.tar.gz" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $aarch64_sig, url: $aarch64_url },
                "darwin-x86_64": { signature: $x64_sig, url: $x64_url }
              }
            }' > latest.json

          cat latest.json
          gh release upload "$TAG" latest.json --repo "${{ github.repository }}" --clobber
