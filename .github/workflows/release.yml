name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            arch: aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            arch: x64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Caja v__VERSION__'
          releaseBody: 'See assets to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      # tauri-action repackages .app into .tar.gz, invalidating the CLI's .sig.
      # Re-sign the repackaged .tar.gz and upload the new .sig.
      - name: Sign and upload updater signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAR_FILE=$(find src-tauri/target -name "Caja.app.tar.gz" -type f | head -1)
          echo "Tar file: $TAR_FILE"
          if [ -z "$TAR_FILE" ]; then
            echo "::error::No .tar.gz found"
            exit 1
          fi

          # Re-sign the repackaged tar.gz
          npx tauri signer sign "$TAR_FILE" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          SIG_FILE="${TAR_FILE}.sig"
          echo "Sig file: $SIG_FILE"
          ls -la "$SIG_FILE"

          gh release upload "${{ github.ref_name }}" "$SIG_FILE#Caja_${{ matrix.arch }}.app.tar.gz.sig" --clobber

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          mkdir -p sigs
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.sig" --dir sigs/

          ls -la sigs/

          AARCH64_SIG=$(cat sigs/Caja_aarch64.app.tar.gz.sig)
          X64_SIG=$(cat sigs/Caja_x64.app.tar.gz.sig)
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg aarch64_url "https://github.com/${{ github.repository }}/releases/download/$TAG/Caja_aarch64.app.tar.gz" \
            --arg x64_sig "$X64_SIG" \
            --arg x64_url "https://github.com/${{ github.repository }}/releases/download/$TAG/Caja_x64.app.tar.gz" \
            '{
              version: $version,
              notes: ("Caja v" + $version),
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $aarch64_sig, url: $aarch64_url },
                "darwin-x86_64": { signature: $x64_sig, url: $x64_url }
              }
            }' > latest.json

          cat latest.json
          gh release upload "$TAG" latest.json --repo "${{ github.repository }}" --clobber
